# This is from Hyprland Wiki. Below is written for managing the environment of Hyprland.
# See hyprland wiki https://wiki.hypr.land/Configuring/Environment-variables/ for more information.

#─────────────────────────────────────
# VARS
# ─────────────────────────────────────
$confDir=$HOME/.config/
$hyprscrDir=$HOME/.config/hypr/scripts
$scrDir=$HOME/.local/bin

# hyprlang if HYPRLAND_V_0_53
# See hyprland wiki https://wiki.hypr.land/Configuring/Uncommon-tips--tricks/
$WINDOWRULES_HYPRLAND_V_0_53 = 1
# hyprlang endif

# hyprlang if HYPRLAND_V_0_54
$WINDOWRULES_HYPRLAND_V_0_54 = 1
$WINDOWRULES_HYPRLAND_V_0_53 = 1

# hyprlang endif


# ─────────────────────────────────────
# XDG-SPECIFCATIONS
# ─────────────────────────────────────
# // XDG specific environment variables are often detected through portals and applications 
# // that may set those for you, however it is not a bad idea to set them explicitly.
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland


# ─────────────────────────────────────
# TOOLKIT
# ─────────────────────────────────────
# // GTK: Use Wayland if available; if not, try X11 and then any other GDK backend.
env = GDK_BACKEND,wayland,x11,*

# // Qt: Use Wayland if available, fall back to X11 if not.
env = QT_QPA_PLATFORM,wayland;xcb

# // Run SDL2 applications on Wayland.
# // Remove or set to x11 if games that provide older versions of SDL cause compatibility issues
env = SDL_VIDEODRIVER,wayland

# ─────────────────────────────────────
# QT-VARS
# ─────────────────────────────────────
# // Tells Qt based applications to pick your theme from qt6ct, use with Kvantum.
env = QT_QPA_PLATFORMTHEME,qt6ct

# // Tells QT based applications to enforce org.kde.desktop handler.
env = QT_QUICK_CONTROLS_STYLE,org.kde.desktop

# // (From the Qt documentation) enables automatic scaling, based on the monitor’s pixel density
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# // Disables window decorations on Qt applications
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# ─────────────────────────────────────
# ELECTRON
# ─────────────────────────────────────
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = WLR_RENDERER,vulkan
env = WLR_RENDERER_ALLOW_SOFTWARE,0

# ─────────────────────────────────────
# NVIDIA
# ─────────────────────────────────────
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GL_GSYNC_ALLOWED
# env = __GL_VRR_ALLOWED,0
# env = AQ_NO_ATOMIC, 1 

# ─────────────────────────────────────
# EXTRA
# ─────────────────────────────────────
env = TERMINAL,kitty -l
env = MOZ_ENABLE_WAYLAND,1
env = EDITOR,nvim

# // Enforce Specified GPU to be used by Hyprland.
# // If `card1` is not available, use `card2` as primary.
# env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2

