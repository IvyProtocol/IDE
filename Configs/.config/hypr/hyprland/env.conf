$confDir=$HOME/.config/
$hyprscrDir=$HOME/.config/hypr/scripts
$scrDir=$HOME/.local/bin

# ─────────────────────────────────────
# XDG // XDG-SPECIFICATIONS
# ─────────────────────────────────────
# // XDG specific environment variables are often detected through portals and applications 
# // that may set those for you, however it is not a bad idea to set them explicitly.
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ─────────────────────────────────────
# TOOLKIT // Toolkit-Backend-Variables
# ─────────────────────────────────────
env = GDK_BACKEND,wayland,x11,* # // GTK: Use Wayland if available; if not, try X11 and then any other GDK backend.
env = QT_QPA_PLATFORM,wayland;xcb # // Qt: Use Wayland if available, fall back to X11 if not.

# // Run SDL2 applications on Wayland.
# // Remove or set to x11 if games that provide older versions of SDL cause compatibility issues
env = SDL_VIDEODRIVER,wayland

# ─────────────────────────────────────
# QT-VARS // QT-Variables
# ─────────────────────────────────────
env = QT_QPA_PLATFORMTHEME,qt6ct # // Tells Qt based applications to pick your theme from qt6ct, use with Kvantum.
env = QT_QUICK_CONTROLS_STYLE,org.kde.desktop # // Tells QT based applications to enforce org.kde.desktop handler. HYPRLAND-QT-SUPPORT
env = QT_AUTO_SCREEN_SCALE_FACTOR,1 # // (From the Qt documentation) enables automatic scaling, based on the monitor’s pixel density
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1 # // Disables window decorations on Qt applications

# ─────────────────────────────────────
# ELECTRON
# ─────────────────────────────────────
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = WLR_RENDERER,vulkan
env = WLR_RENDERER_ALLOW_SOFTWARE,0

# ─────────────────────────────────────
# NVIDIA
# ─────────────────────────────────────
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GL_GSYNC_ALLOWED
# env = __GL_VRR_ALLOWED,0
# env = AQ_NO_ATOMIC, 1 

# ─────────────────────────────────────
# XWAYLAND
# ─────────────────────────────────────
# // XWAYLAND apps scale fix (useful if you are use monitor scaling)
# // 1 is 100% 1.5 is 150%
# // See hyprland wiki https://wiki.hyprland.org/Configuring/XWayland/
env = GDK_SCALE,1
env = QT_SCALE_FACTOR,1

# ─────────────────────────────────────
# EXTRA
# ─────────────────────────────────────
env = TERMINAL,kitty -l
env = MOZ_ENABLE_WAYLAND,1
env = EDITOR,nvim

# ─────────────────────────────────────
# AQ-ENV // Aquamarine-Environment
# ─────────────────────────────────────
# env = AQ_TRACE,1 # // Enables more verbose logging.
# env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2 # // Enforce Specified GPU to be used by Hyprland. If `card1` is not available, use `card2` as primary.
# env = AQ_MGPU_NO_EXPLICIT,1 # // Disables explicit syncing on mgpu buffers
# env = AQ_NO_MODIFIERS,1 # // Disables modifiers for DRM buffers

# ─────────────────────────────────────
# HYPRLAND-ENV-VARS // Hyprland-Environemnt-Variables
# ─────────────────────────────────────
# // See hyprland wiki: https://wiki.hyprland.org/Configuring/Environment-variables/#hyprland-environment-variables

# env = HYPRLAND_TRACE,1 # // Enables more verbose logging.
# env = HYPRLAND_NO_RT,1 # // Disables realtime priority setting by Hyprland.
# env = HYPRLAND_NO_SD_NOTIFY,1 # // If systemd, disables the 'sd_notify' calls.
# env = HYPRLAND_NO_SD_VARS,1 # // Disables management of variables in systemd and dbus activation environments.
