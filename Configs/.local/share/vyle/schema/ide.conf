rofiLauncherScale=9
rofiLauncherStyle=1

# wbselecgen.sh configuration
rofiWallpaperScale=9
# rofiWallpaperColumn=

# themeswitch.sh configuration.

rofiThemeScale=9
# rofiThemeColumn=
rofiThemeStyle=2

# style-launcher.sh configuration.
rofiStyleScale=9

# wallbashtoggle.sh configuration
rofiWallbashScale=9

