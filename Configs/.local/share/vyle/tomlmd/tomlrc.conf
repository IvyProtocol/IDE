rofiStyleScale=${ROFI_SWITCH_SCALE}

# wallbashtoggle.sh configuration
rofiWallbashFont="${ROFI_WALLBASH_FONT}"
rofiWallbashScale=${ROFI_WALLBASH_SCALE}

